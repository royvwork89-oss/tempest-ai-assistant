<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tempest</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <h2>Tempest</h2>

      <button id="newChatBtn">+ Nuevo Chat</button>
      <div id="chatList"></div>

      <hr>

      <button id="newProjectBtn">+ Nuevo Proyecto</button>
      <div id="projectList"></div>
    </aside>

    <div class="chat-app">
      <header class="chat-header">
        <h1>Tempest</h1>
        <p>Asistente local conectado a tu backend</p>

        <div class="smart-menu">
          <button id="menuTrigger" class="smart-menu-trigger">modelo</button>

          <div id="smartMenuPanel" class="smart-menu-panel hidden">
            <div id="menuViewRoot" class="menu-view">
              <button class="menu-item" data-view="local">local</button>
              <button class="menu-item" data-view="services">servicios</button>
            </div>

            <div id="menuViewLocal" class="menu-view hidden">
              <button class="menu-back" data-back="root">← volver</button>
              <!-- Los modelos locales se generan desde app.js según el perfil de hardware -->
            </div>

            <div id="menuViewServices" class="menu-view hidden">
              <button class="menu-back" data-back="root">← volver</button>
              <button class="menu-item service-entry" data-service="openai">OpenAI</button>
              <button class="menu-item service-entry" data-service="google">Google</button>
            </div>

            <div id="menuViewOpenAI" class="menu-view hidden">
              <button class="menu-back" data-back="services">← volver</button>
              <button class="menu-item service-model" data-service="openai"
                data-model="gpt-4o-mini">GPT-4o-mini</button>
              <button class="menu-item service-model" data-service="openai"
                data-model="gpt-4.1-mini">GPT-4.1-mini</button>
            </div>

            <div id="menuViewGoogle" class="menu-view hidden">
              <button class="menu-back" data-back="services">← volver</button>
              <button class="menu-item service-model" data-service="google" data-model="gemini-2.5-flash">Gemini 2.5
                Flash</button>
              <button class="menu-item service-model" data-service="google" data-model="gemini-2.5-pro">Gemini 2.5
                Pro</button>
            </div>
          </div>
        </div>
      </header>

      <main id="chatBox" class="chat-box"></main>

      <div id="typing" class="typing"></div>

      <footer class="chat-input-area">
        <div class="input-wrapper">
          <div id="attachmentPreview" class="attachment-preview hidden"></div>
          <textarea id="userInput" placeholder="Escribe tu mensaje..." autocomplete="off" rows="1"></textarea>
          <div class="input-toolbar">
            <div class="tool-menu">
              <button id="toolMenuBtn" class="tool-menu-btn">+</button>
              <div id="toolMenuPanel" class="tool-menu-panel hidden">
                <button id="transcriptionBtn" class="tool-menu-item">Transcripción</button>
                <button id="addFileBtn" class="tool-menu-item">Añadir archivo</button>
                <input type="file" id="fileInput" multiple
                  accept="image/*,.pdf,.docx,.xlsx,.txt,.md,.html,.css,.js,.ts,.jsx,.tsx,.json,.yaml,.yml,.xml,.csv,.py,.java,.c,.cpp,.h,.cs,.php,.rb,.go,.rs,.sh,.bash,.env,.ini,.toml,.sql"
                  style="display:none">
                <button class="tool-menu-item" disabled>Crear imagen</button>
                <button class="tool-menu-item" disabled>Crear video</button>
              </div>
            </div>
            <button id="sendBtn" class="send-btn" title="Enviar">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405z" />
              </svg>
            </button>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <div id="transcriptionModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Transcripción</h2>

      <label>Audio</label>
      <input type="file" id="transcriptionAudioInput" accept="audio/*" />

      <label>Tipo de texto</label>
      <select id="transcriptionMode">
        <option value="plain">Texto corrido</option>
        <option value="timestamps">Con divisiones de tiempo</option>
      </select>

      <label>Formato</label>
      <select id="transcriptionFormat">
        <option value="txt">TXT</option>
        <option value="pdf">PDF</option>
        <option value="docx">Word DOCX</option>
      </select>

      <div class="modal-actions">
        <button id="cancelTranscriptionBtn">Cancelar</button>
        <button id="processTranscriptionBtn">Crear archivo</button>
      </div>
    </div>
  </div>

  <div id="deleteConfirmModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Confirmar eliminación</h2>
      <p id="deleteConfirmText"></p>

      <div class="modal-actions">
        <button id="cancelDeleteBtn">Cancelar</button>
        <button id="confirmDeleteBtn">Eliminar</button>
      </div>
    </div>
  </div>

  <div id="newProjectModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Nuevo proyecto</h2>

      <label>Nombre del proyecto</label>
      <input id="newProjectNameInput" type="text" placeholder="Ejemplo: IA local, Trabajo, Backend..." />

      <div class="modal-actions">
        <button id="cancelNewProjectBtn">Cancelar</button>
        <button id="confirmNewProjectBtn">Crear</button>
      </div>
    </div>
  </div>
  <div id="renameModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Renombrar</h2>
      <label id="renameModalLabel">Nuevo nombre</label>
      <input id="renameModalInput" type="text" placeholder="Escribe el nuevo nombre..." />
      <div class="modal-actions">
        <button id="cancelRenameBtn">Cancelar</button>
        <button id="confirmRenameBtn">Renombrar</button>
      </div>
    </div>
  </div>
  <!-- Modal: Context Files del proyecto -->
  <div id="contextFilesModal" class="modal-overlay hidden">
    <div class="modal-box modal-box--wide">
      <h2>Archivos de contexto — <span id="contextFilesProjectName"></span></h2>

      <div class="context-files-upload">
        <label class="context-upload-label">
          <input type="file" id="contextFileInput" multiple
            accept=".txt,.md,.html,.css,.js,.ts,.jsx,.tsx,.json,.yaml,.yml,.xml,.csv,.py,.java,.c,.cpp,.h,.cs,.php,.rb,.go,.rs,.sh,.bash,.env,.ini,.toml,.sql,.pdf,.docx,.xlsx,.pptx"
            style="display:none">
          <button type="button" id="contextUploadBtn" class="btn-secondary">+ Subir archivos</button>
        </label>
        <span id="contextUploadStatus" class="context-upload-status"></span>
      </div>

      <div id="contextFilesList" class="context-files-list">
        <p class="context-empty">No hay archivos de contexto. Sube archivos para que Tempest los use en este proyecto.
        </p>
      </div>

      <div class="modal-actions">
        <button id="closeContextFilesBtn">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Configuración del proyecto -->
  <div id="projectConfigModal" class="modal-overlay hidden">
    <div class="modal-box modal-box--wide">
      <h2>Configuración — <span id="projectConfigName"></span></h2>

      <label for="projectPromptTextarea">Prompt personalizado del proyecto</label>
      <textarea id="projectPromptTextarea" rows="10"
        placeholder="Instrucciones específicas para este proyecto...&#10;Ej: Eres un experto en Django. Usa siempre TypeScript. Prefiere patrones REST..."></textarea>

      <div class="modal-actions">
        <button id="cancelProjectConfigBtn">Cancelar</button>
        <button id="saveProjectConfigBtn">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
