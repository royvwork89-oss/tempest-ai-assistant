name: llama-3.2-3b-q4
backend: llama-cpp
model: Hermes-3-Llama-3.2-3B-Q4_K_M.gguf

threads: 6
context_size: 4096
f16: true
gpu-layers: 35

parameters:
  model: Hermes-3-Llama-3.2-3B-Q4_K_M.gguf
  temperature: 0.35
  top_p: 0.9
  mirostat: 2
  mirostat_tau: 4.5
  mirostat_eta: 0.1
  repeat_penalty: 1.18

stopwords:
  - "<|eot_id|>"
  - "<|end_of_text|>"
  - "¿Hay algo más"
  - "¿Hay algún"

template:
  chatMessage: |
    <|start_header_id|>{{.RoleName}}<|end_header_id|>

    {{.Content}}<|eot_id|>
  chat: |
    <|begin_of_text|>{{.Input}}<|start_header_id|>assistant<|end_header_id|>